services:
  - type: web
    name: maya-dreampair
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: GREEN_API_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: GREEN_API_BASE_URL
        value: https://api.greenapi.com
      - key: GOOGLE_SHEETS_CSV_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: HUMAN_AGENT_WHATSAPP
        sync: false
      - key: HANDOFF_TRIGGER_KEYWORDS
        value: agent,human,support,help me,problem
      - key: CATALOG_SYNC_CRON
        value: "*/30 * * * *"
      - key: ABANDONED_CART_HOURS
        value: 2
